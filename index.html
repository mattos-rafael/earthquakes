<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
     integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
     crossorigin=""/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
     integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
     crossorigin=""></script>
  <link rel="stylesheet" href="./style.css">
  <title>Earthquake Watcher</title>
</head>
<body>
  <header>
    <h1>Earthquake Watcher</h1>
  </header>
  <main>
    <section class="map-section">
      <button id="api-data">Last 24h</button>
      <button id="fav-data">Favorites</button>
    </section>
    <div class="map-div"><div id="map"></div></div>

    <section class="form-section">
      <h2>Register</h2>
      <div>
        <form id="register" action="#" method="post">
            <label for="email">Email</label>
            <input type="email" name="email" id="register-email">
            <label for="password">Password</label>
            <input type="password" name="password" id="register-password">
            <label for="password2">Confirm Password</label>
            <input type="password" name="password2" id="register-password2">
            <input class="submit-btn" type="submit" value="Register">
        </form>
      </div>
    </section>
    <section class="form-section">
      <h2>Login</h2>
      <div>
        <form id="login" action="#" method="post">
            <label for="email">Email</label>
            <input type="email" name="email" id="login-email">
            <label for="password">Password</label>
            <input type="password" name="password" id="login-password">
            <input class="submit-btn" type="submit" value="Login">
        </form>
      </div>
    </section>

    <div id="logout-btn">
      <h4 id="user"></h4>
      <h2>Logout</h2>
      <button  onclick="logoutUser()">Logout</button>
    </div>
    
      
    
    <section id="filter">
      <div class="map-div"><div id="map2"></div></div>
      
      <div id="filter-btn">
        <label for="magnitude">Magnitude</label>
        <select name="magnitude" id="filter-mag">
          <option value="">all</option>
          <option value="0">0</option>
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
          <option value="6">6</option>
          <option value="7">7</option>
        </select>
        <label for="start-date">Start date</label>
        <input type="date" name="start-date" id="filter-start-date">
        <label for="end-date">End date</label>
        <input type="date" name="end-date" id="filter-end-date">
      </div>
    </section>
  </main>
  <footer>
    <a href="https://www.flaticon.com/free-icons/pin" title="pin icons">Pin icons created by Those Icons - Flaticon</a>
  </footer>
<!-- The core Firebase JS SDK is always required and must be listed first -->
  <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-app.js"></script>

  <!-- TODO: Add SDKs for Firebase products that you want to use
      https://firebase.google.com/docs/web/setup#available-libraries -->
  <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-firestore.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.7.1/firebase-auth.js"></script>

  <script src="./script.js"></script>
</body>
</html>
